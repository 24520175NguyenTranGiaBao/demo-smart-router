<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Router - Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-network-wired me-2"></i>Smart Router
            </a>
            <button type="button" class="btn btn-outline-warning btn-sm" data-bs-toggle="modal" data-bs-target="#customRuleModal">
                <i class="fas fa-shield-alt me-1"></i> Custom Rule
            </button>
        </div>
    </nav>
    
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-dark text-white fw-bold d-flex justify-content-between align-items-center">
            <div>
                <i class="fas fa-chart-area"></i> Băng thông Realtime theo Node (KB/s)
            </div>
            <div class="d-flex align-items-center">
                <label for="targetNodeSelect" class="me-2 mb-0 small text-nowrap">Theo dõi IP:</label>
                <select id="targetNodeSelect" class="form-select form-select-sm" style="width: auto; min-width: 160px; background-color: #343a40; color: white; border-color: #6c757d;">
                    <option value="">-- Chọn một thiết bị --</option>
                    </select>
            </div>
        </div>
        <div class="card-body">
            <canvas id="trafficChart" height="80"></canvas>
        </div>
    </div>

    <div class="container">
        <div class="row mb-3">
            <div class="col">
                <h4 class="mb-0 text-secondary"><i class="fas fa-users me-2"></i>Connected Devices</h4>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 device-table">
                        <thead>
                            <tr>
                                <th>Device Name</th>
                                <th>IP Address</th>
                                <th>MAC Address</th>
                                <th>Status</th>
                                <th>Last Seen</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="device-list">
                            <tr>
                                <td colspan="6" class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p class="mt-2 text-muted">Scanning LAN...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
    <div class="modal fade" id="customRuleModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title"><i class="fas fa-shield-alt me-2"></i>Custom iptables Rule</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="customRuleForm">
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label text-muted small">Action & Chain</label>
                            <select class="form-select" id="ruleAction">
                                <option value="-I">Insert (-I FORWARD)</option>
                                <option value="-A">Append (-A FORWARD)</option>
                                <option value="-D">Delete (-D FORWARD)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted small">Protocol (-p)</label>
                            <select class="form-select" id="ruleProtocol">
                                <option value="all">All</option>
                                <option value="tcp">TCP</option>
                                <option value="udp">UDP</option>
                                <option value="tcp_udp">TCP + UDP (Web/HTTPS)</option>
                                <option value="icmp">ICMP</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label text-muted small">Target (-j)</label>
                            <select class="form-select" id="ruleTarget">
                                <option value="DROP" class="text-danger">DROP</option>
                                <option value="REJECT" class="text-warning">REJECT</option>
                                <option value="ACCEPT" class="text-success">ACCEPT</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-muted small">Source IP (-s)</label>
                            <input type="text" class="form-control" id="ruleSrcIp" placeholder="e.g., 192.168.99.10 or ANY">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small">Destination IP (-d)</label>
                            <input type="text" class="form-control" id="ruleDstIp" placeholder="e.g., 8.8.8.8 or ANY">
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6">
                            <label class="form-label text-muted small">Source Port (--sport)</label>
                            <input type="number" class="form-control" id="ruleSport" placeholder="Requires TCP/UDP">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-muted small">Dest Port (--dport)</label>
                            <input type="number" class="form-control" id="ruleDport" placeholder="Requires TCP/UDP">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer d-flex justify-content-between">
                <small class="text-info"><i class="fas fa-info-circle"></i> Leave IP/Port blank to apply to ALL. For HTTPS websites, use TCP + UDP with port 443.</small>
                <div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="btnApplyCustomRule">Apply Rule</button>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
