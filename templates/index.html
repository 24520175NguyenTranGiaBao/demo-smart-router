<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Router - Dashboard</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f6f9; }
        .navbar { box-shadow: 0 2px 4px rgba(0,0,0,.1); }
        .device-table th { background-color: #2c3e50; color: white; }
        .mac-font { font-family: monospace; font-size: 1.1em; color: #e74c3c; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-network-wired me-2"></i>Smart Router SDN
            </a>
            <button class="btn btn-outline-info btn-sm" onclick="loadDevices()">
                <i class="fas fa-sync-alt me-1"></i> Refresh Data
            </button>
        </div>
    </nav>

    <div class="container">
        <div class="row mb-3">
            <div class="col">
                <h4 class="mb-0 text-secondary"><i class="fas fa-users me-2"></i>Connected Devices</h4>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 device-table">
                        <thead>
                            <tr>
                                <th>Device Name</th>
                                <th>IP Address</th>
                                <th>MAC Address</th>
                                <th>Status</th>
                                <th>Last Seen</th>
                                <th class="text-center">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="device-list">
                            <tr>
                                <td colspan="6" class="text-center py-4">
                                    <div class="spinner-border text-primary" role="status">
                                        <span class="visually-hidden">Loading...</span>
                                    </div>
                                    <p class="mt-2 text-muted">Scanning LAN...</p>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
<script>
        // Run immediately when the page is loaded.
        document.addEventListener("DOMContentLoaded", loadDevices);
        function loadDevices() {
            const tbody = document.getElementById("device-list");
            // Display loading spinner.
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 text-muted">Refreshing data...</p></td></tr>`;

            // Request data from API.
            fetch('/api/devices')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'success') {
                        renderTable(data.data);
                    } else {
                        tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Server error: ${data.message}</td></tr>`;
                    }
                })
                .catch(error => {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center text-danger">Lost connection to API server!</td></tr>`;
                    console.error('Error:', error);
                });
        }

        function renderTable(devices) {
            const tbody = document.getElementById("device-list");
            tbody.innerHTML = ""; // Clear loading spinner.

            if (devices.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">No devices found on the network.</td></tr>`;
                return;
            }

            // Build table rows for each device.
            devices.forEach(device => {
                const isBlocked = device.IsBlocked === 1;
                
                // Status badge rendering.
                let statusBadge = '';
                if (isBlocked) {
                    statusBadge = `<span class="badge bg-danger"><i class="fas fa-lock me-1"></i>Blocked</span>`;
                } else if (device.IsOnline) {
                    statusBadge = `<span class="badge bg-success"><i class="fas fa-globe me-1"></i>Online</span>`;
                } else {
                    statusBadge = `<span class="badge bg-secondary"><i class="fas fa-moon me-1"></i>Offline</span>`;
                }
                
                // Action button state.
                const actionButton = isBlocked
                    ? `<button class="btn btn-sm btn-outline-success" onclick="toggleBlock('${device.MacAddress}', 'unblock')"><i class="fas fa-unlock me-1"></i> Unblock</button>`
                    : `<button class="btn btn-sm btn-outline-danger" onclick="toggleBlock('${device.MacAddress}', 'block')"><i class="fas fa-ban me-1"></i> Block MAC</button>`;

                // Name priority: CustomName > OriginalName > fallback.
                const displayName = device.CustomName || device.OriginalName || "Unknown";

                const row = `
                    <tr>
                        <td class="fw-bold align-middle">${displayName}</td>
                        <td class="align-middle">${device.IpAddress}</td>
                        <td class="mac-font align-middle">${device.MacAddress}</td>
                        <td class="align-middle">${statusBadge}</td>
                        <td class="align-middle text-muted">${device.LastSeen}</td>
                        <td class="text-center align-middle">${actionButton}</td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        function toggleBlock(mac, action) {
            // Resolve endpoint by action type.
            const endpoint = action === 'block' ? '/api/block' : '/api/unblock';
            
            // Call API with POST and include MAC address in body.
            fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mac: mac })
            })
            .then(response => response.json())
            .then(data => {
                if (data.status === 'success') {
                    // Reload table after successful action.
                    loadDevices();
                } else {
                    alert('Error: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Cannot connect to the iptables command server!');
            });
        }
    </script>
</body>
</html>
